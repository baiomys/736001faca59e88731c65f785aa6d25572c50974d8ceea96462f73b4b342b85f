<!DOCTYPE html>
<html lang="ru">
<head>
    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA - Neural Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body, html {
            height: 100dvh; 
            overflow: hidden;
            background-color: #000;
            color: #fff;
        }

        .video-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(to right, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .ui-wrapper {
            position: relative;
            z-index: 10;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        @media (max-width: 768px) {
            .ui-wrapper { 
                padding: 30px 20px 40px 20px;
            }
            h1 { font-size: 2.5rem !important; }
            .model-specs { font-size: 0.6rem !important; }
            .btn-connect { 
                width: 100%; 
                padding: 18px 30px !important; 
                text-align: center; 
            }
            .status-bar { 
                display: none; 
            }
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .model-specs {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            text-transform: uppercase;
        }

        .lang-switcher button, .sound-toggle {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 5px 10px;
            margin-left: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .lang-switcher button.active {
            background: #fff;
            color: #000;
        }

        .sound-toggle.muted {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .bottom-panel {
            text-align: left;
            max-width: 800px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 5px;
            line-height: 1;
        }

        .description {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            max-width: 400px;
            border-left: 2px solid #fff;
            padding-left: 15px;
        }

        .btn-connect {
            display: inline-block;
            padding: 20px 60px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.4s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-connect:hover {
            background: #00f3ff;
            transform: translateX(10px);
        }

        .status-bar {
            margin-top: 20px;
            font-size: 0.8rem;
            font-family: monospace;
            color: #00f3ff;
        }
    </style>
</head>
<body>

<audio id="bg-music" src="2.mp3" loop></audio>

<div class="video-background">
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="mobile_aria.mp4" type="video/mp4" media="(max-width: 768px)">
        <source src="aria.mp4" type="video/mp4">
    </video>
</div>

<div class="overlay"></div>
<div class="scanline"></div>

<div class="ui-wrapper">
    <header>
        <div class="model-specs">
            CORE: ARIA_V4.0<br>
            PARAMS: 120B NEURAL NODES<br>
            STATUS: SYNCHRONIZED<br>
            MEM_PRIORITY: HIGH
        </div>
        <div class="lang-switcher">
            <button onclick="toggleSound()" class="sound-toggle" id="sound-btn">SOUND ON</button>
            <button onclick="setLang('en')" id="btn-en">EN</button>
            <button onclick="setLang('ru')" id="btn-ru">RU</button>
            <button onclick="setLang('tr')" id="btn-tr">TR</button>
        </div>
    </header>

    <div class="bottom-panel">
        <h1 data-key="name">ARIA</h1>
        <p class="description" data-key="desc">
            Adaptive neural companion refined for immersive conversation, emotional intelligence, and intimate late-night chemistry.
        </p>
        <a href="https://t.me/sinoramabot" class="btn-connect" data-key="cta">Establish Connection</a>
        <div class="status-bar">
            > <span data-key="status">System ready. Waiting for input...</span>
        </div>
    </div>
</div>

<script>
   const translations = {
    en: {
        name: "ARIA",
        desc: "Adaptive neural companion refined for immersive conversation, emotional intelligence, and intimate late-night chemistry.",
        cta: "Start Chatting",
        status: "System ready. Connection: Encrypted"
    },
    ru: {
        name: "АРИЯ",
        desc: "Адаптивная нейросеть нового поколения для глубокого общения, эмоционального контакта и особой атмосферы в личных диалогах.",
        cta: "Начать общение",
        status: "Система готова. Соединение: Зашифровано"
    },
    tr: {
        name: "ARIA",
        desc: "Sürükleyici sohbetler, duygusal uyum ve özel gece konuşmaları için geliştirilmiş gelişmiş yapay zeka modeli.",
        cta: "Sohbete Başla",
        status: "Sistem hazır. Bağlantı: Şifreli"
    }
};

    const music = document.getElementById('bg-music');
    const soundBtn = document.getElementById('sound-btn');

    function toggleSound() {
        if (music.paused) {
            music.play();
            soundBtn.innerText = "SOUND ON";
            soundBtn.classList.remove('muted');
        } else {
            music.pause();
            soundBtn.innerText = "SOUND OFF";
            soundBtn.classList.add('muted');
        }
    }

    function setLang(lang) {
        document.querySelectorAll('[data-key]').forEach(elem => {
            elem.innerText = translations[lang][elem.getAttribute('data-key')];
        });

        document.querySelectorAll('.lang-switcher button:not(.sound-toggle)').forEach(btn => {
            btn.classList.toggle('active', btn.id === `btn-${lang}`);
        });
        localStorage.setItem('selected_lang', lang);
    }

    setLang(localStorage.getItem('selected_lang') || 'en');

    // Запуск при первом взаимодействии (браузеры блокируют автоплей со звуком)
    document.addEventListener('touchstart', function() {
        document.getElementById('bg-video').play();
        if (music.paused && !soundBtn.classList.contains('muted')) {
            music.play();
        }
    }, {once: true});

    document.addEventListener('click', function() {
        if (music.paused && !soundBtn.classList.contains('muted')) {
            music.play();
        }
    }, {once: true});
</script>

</body>
</html>
